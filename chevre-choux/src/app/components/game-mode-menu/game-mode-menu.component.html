

<div class="selection">

  <div class="bg-graph" aria-hidden="true">
    <svg class="bg-graph__svg" viewBox="0 0 1200 700" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <g class="bg-edges" stroke="rgba(255,255,255,0.06)" stroke-width="1.5" fill="none">
        <line x1="120" y1="140" x2="380" y2="260"/>
        <line x1="380" y1="260" x2="600" y2="120"/>
        <line x1="600" y1="120" x2="820" y2="280"/>
        <line x1="820" y1="280" x2="1080" y2="160"/>
        <line x1="380" y1="260" x2="480" y2="480"/>
        <line x1="600" y1="120" x2="480" y2="480"/>
        <line x1="820" y1="280" x2="700" y2="520"/>
        <line x1="480" y1="480" x2="700" y2="520"/>
        <line x1="700" y1="520" x2="950" y2="580"/>
        <line x1="1080" y1="160" x2="950" y2="580"/>
        <line x1="120" y1="140" x2="480" y2="480"/>
        <line x1="240" y1="580" x2="480" y2="480"/>
        <line x1="240" y1="580" x2="700" y2="520"/>
      </g>

      <g class="bg-nodes" fill="rgba(255,255,255,0.12)">
        <circle cx="120"  cy="140" r="7"/>
        <circle cx="380"  cy="260" r="9"/>
        <circle cx="600"  cy="120" r="8"/>
        <circle cx="820"  cy="280" r="10"/>
        <circle cx="1080" cy="160" r="7"/>
        <circle cx="480"  cy="480" r="11"/>
        <circle cx="700"  cy="520" r="9"/>
        <circle cx="950"  cy="580" r="7"/>
        <circle cx="240"  cy="580" r="8"/>
      </g>
    </svg>
  </div>

  <header class="ms-header">
    <div class="ms-header__logo">
      <img src="assets/logo-TN.png" alt="Logo Terra Numerica" class="ms-header__logo-img">
    </div>
    <div class="ms-header__text">
      <span class="ms-header__eyebrow">Terra Numerica</span>
      <h1 class="ms-header__title">Jeu de la chèvre<br><em>et des choux</em></h1>
    </div>
  </header>

  <main class="ms-grid">

    <div class="ms-card ms-card--play" routerLink="/configuration" tabindex="0" role="button">
      <div class="ms-card__glow"></div>
      <div class="ms-card__icon-wrap">
        <img src="assets/free-game.svg" alt="" class="ms-card__icon">
      </div>
      <div class="ms-card__body">
        <span class="ms-card__tag">Jouer</span>
        <h2 class="ms-card__name">Jeu libre</h2>
        <p class="ms-card__desc">Configurez votre plateau, vos adversaires et lancez la partie.</p>
      </div>
      <span class="ms-card__arrow">→</span>
    </div>

    <div class="ms-card ms-card--rules" (click)="displayRules()" tabindex="0" role="button">
      <div class="ms-card__glow"></div>
      <div class="ms-card__icon-wrap">
        <img src="assets/rules.svg" alt="" class="ms-card__icon">
      </div>
      <div class="ms-card__body">
        <span class="ms-card__tag">Info</span>
        <h2 class="ms-card__name">Voir les règles</h2>
        <p class="ms-card__desc">Comprenez les mécaniques du jeu avant de vous lancer.</p>
      </div>
      <span class="ms-card__arrow">→</span>
    </div>

    <div class="ms-card ms-card--credits" routerLink="/credit" tabindex="0" role="button">
      <div class="ms-card__glow"></div>
      <div class="ms-card__icon-wrap">
        <img src="assets/hand-shake.svg" alt="" class="ms-card__icon">
      </div>
      <div class="ms-card__body">
        <span class="ms-card__tag">Équipe</span>
        <h2 class="ms-card__name">Crédits</h2>
        <p class="ms-card__desc">Découvrez les contributeurs du projet Terra Numerica.</p>
      </div>
      <span class="ms-card__arrow">→</span>
    </div>

  </main>
</div>
